# JWT ??
jwt:
  secret: ${JWT_SECRET}
  access-token-validity: ${JWT_ACCESS_TOKEN_VALIDITY}
  refresh-token-validity: ${JWT_REFRESH_TOKEN_VALIDITY}

springdoc:
  swagger-ui:
    path: /api/swagger-ui.html
  api-docs:
    path: /api/v3/api-docs

server:
  port: ${SERVER_PORT}

cors:
  allowed-origins:
    - ${CORS_ORIGIN_LOCAL_VITE:http://localhost:5173}
    - ${CORS_ORIGIN_LOCAL_REACT:http://localhost:3000}
  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS

#  이메일 설정
email:
  code:
    expired-time: 300000   # 5분(ms) - 인증 코드 유효 시간
  token:
    expired-time: 1800000  # 30분(ms) - 이메일 인증 토큰 유효 시간